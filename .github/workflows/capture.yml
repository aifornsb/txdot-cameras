name: TxDOT Dallas — Camera Capture (All Cameras)

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC
    - cron: '0 6 * * *'   # 6am UTC
    - cron: '0 12 * * *'  # noon UTC
    - cron: '0 18 * * *'  # 6pm UTC
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Write TxDOT cookies
        env:
          TXDOT_COOKIES: ${{ secrets.TXDOT_COOKIES }}
        run: |
          if [ -n "$TXDOT_COOKIES" ]; then
            echo "$TXDOT_COOKIES" > browser_cookies.json
            echo "Cookies written ($(wc -c < browser_cookies.json) bytes)"
          else
            echo "TXDOT_COOKIES not set — toll columns will be blank this run"
          fi

      - name: Run capture loop (every 5 min for 6 hours)
        run: python capture.py
