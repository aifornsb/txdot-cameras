name: TxDOT Dallas — Camera Capture (All Cameras)

on:
  # Runs 4 times a day — each run loops internally every 5 minutes for 6 hours
  # Together the 4 runs cover a full 24 hours with no gaps
  schedule:
    - cron: '0 0  * * *'   # midnight UTC
    - cron: '0 6  * * *'   # 6am UTC
    - cron: '0 12 * * *'   # noon UTC
    - cron: '0 18 * * *'   # 6pm UTC
  workflow_dispatch:        # manual trigger

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours — matches the loop duration
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install playwright

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Run capture loop (every 5 min for 6 hours)
        run: python capture.py
