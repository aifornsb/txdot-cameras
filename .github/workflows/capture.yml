name: TxDOT Dallas — Camera Capture (All Cameras)

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # manual trigger from GitHub website

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Capture all cameras
        run: python capture.py

      - name: Commit images to repository
        run: |
          git config user.name  "Camera Bot"
          git config user.email "camera-bot@github-actions"
          git add images/ summary.csv
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git pull --rebase origin main
          git push
